<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZDX TextUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="notify-info"    class="notify info"    style="display:none">
    <span class="material-symbols-outlined icon">info</span>
    <span class="text" id="text-info"></span>
  </div>
  <div id="notify-success" class="notify success" style="display:none">
    <span class="material-symbols-outlined icon">check_circle</span>
    <span class="text" id="text-success"></span>
  </div>
  <div id="notify-error"   class="notify error"   style="display:none">
    <span class="material-symbols-outlined icon">error</span>
    <span class="text" id="text-error"></span>
  </div>
  <script src="app.js"></script>
</body>
</html>
