<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    /* ── ZDX Chat Theme ──
       Cinematic dark theme. Accent color: #c8a04b (ZDX gold)
    */

    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    :root {
      --zdx-accent: #c8a04b;
      --zdx-accent-dim: rgba(200, 160, 75, 0.18);
      --zdx-bg: rgba(15, 15, 15, 0.82);
      --zdx-input-bg: rgba(22, 22, 22, 0.88);
    }

    /* Chat messages */
    .message-body {
      font-family: 'Poppins', sans-serif;
      font-size: 1.6vh;
      color: #e8e8e8;
      filter: url(#svgDropShadowFilter);
    }

    /* Username bold */
    .message-author {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: #fff;
    }

    /* Brackets in ZDX gold */
    .message-prefix-left,
    .message-prefix-right {
      color: var(--zdx-accent);
    }

    /* Input box */
    #chatInput {
      background: var(--zdx-input-bg) !important;
      border: 1px solid var(--zdx-accent) !important;
      border-radius: 5px !important;
      outline: none !important;
      color: #fff !important;
      font-family: 'Poppins', sans-serif !important;
      font-size: 1.5vh !important;
      box-shadow: 0 0 8px rgba(200, 160, 75, 0.15) !important;
    }

    /* Chat window background */
    #chat-box {
      background: var(--zdx-bg) !important;
      border-radius: 0 !important;
    }

    /* Suggestions */
    .suggestion-item {
      background: transparent !important;
      color: #ccc !important;
    }
    .suggestion-item:hover {
      background: var(--zdx-accent-dim) !important;
      color: #fff !important;
    }
  </style>
</head>
<body>
  <!-- SVG drop shadow filter for chat text -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden">
    <defs>
      <filter id="svgDropShadowFilter" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur" />
        <feOffset in="blur" dx="1" dy="1" result="offset" />
        <feFlood flood-color="rgba(0,0,0,0.7)" flood-opacity="1" result="flood" />
        <feComposite in="flood" in2="offset" operator="in" result="shadow" />
        <feMerge>
          <feMergeNode in="shadow" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
  </svg>
</body>
</html>
